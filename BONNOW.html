    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --accent: #f59e0b;
            --gold: #fbbf24;
            /* УКАЖИТЕ ИМЯ ВАШЕГО ФАЙЛА ИЗ ПАПКИ НИЖЕ */
            /* Например: url('bg.jpg') или url('my_background.png') */
            --bg-image-url: url('bg.jpg');
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #030305;
            color: #ffffff;
            margin: 0;
            overflow: hidden;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Слой с фоновым изображением (локальный файл) */
        .bg-image {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: var(--bg-image-url);
            background-size: cover;
            background-position: center;
            opacity: 0.5; /* Прозрачность картинки */
            filter: grayscale(10%) brightness(0.4); /* Эффекты для лучшей читаемости текста */
        }

        .bg-aura {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.2;
            animation: move 25s infinite alternate;
        }

        .blob-2 {
            background: var(--secondary);
            right: -100px;
            top: -100px;
            animation-duration: 30s;
            opacity: 0.15;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        h1, h2, .font-unbounded { 
            font-family: 'Unbounded', sans-serif; 
            letter-spacing: -0.04em;
        }

        .glass-card {
            background: rgba(10, 10, 15, 0.45);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 56px;
            padding: 3.5rem 1.75rem 3rem;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 10;
        }

        .gift-float {
            filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.5));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-20px) rotate(4deg); }
        }

        .premium-btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            background-size: 200% 200%;
            animation: gradient-shift 5s linear infinite;
            box-shadow: 0 15px 35px -10px rgba(99, 102, 241, 0.6);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .scanner-line {
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            position: absolute;
            top: 0;
            animation: scan 2s linear infinite;
            box-shadow: 0 0 20px var(--primary);
            z-index: 20;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .arrow-indicator {
            animation: arrow-float 1.4s infinite ease-in-out;
            color: rgba(255, 255, 255, 0.5);
        }

        @keyframes arrow-float {
            0%, 100% { transform: translateY(0); opacity: 0.2; }
            50% { transform: translateY(12px); opacity: 0.9; }
        }

        .step-hidden { display: none; }
        .fade-in { animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px) scale(0.92); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            background-size: 200% 100%;
            animation: shimmer 2.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>

        let currentLang = 'ru';
        let loaderPhrases = translations.ru.steps;

        async function initLanguage() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                const country = data.country_code.toLowerCase();
                
                // Маппинг стран к языкам
                const countryToLang = {
                    hu: 'hu', cs: 'cs', cz: 'cs', sk: 'sk', de: 'de', at: 'de', ch: 'de',
                    it: 'it', gr: 'el', el: 'el', lv: 'lv', fr: 'fr', be: 'fr', se: 'sv', 
                    sv: 'sv', ro: 'ro', md: 'ro', no: 'no', kz: 'kz', uz: 'uz', tr: 'tr', 
                    br: 'pt', pt: 'pt', ru: 'ru', by: 'ru'
                };

                if (countryToLang[country]) {
                    currentLang = countryToLang[country];
                } else {
                    const browserLang = navigator.language.split('-')[0];
                    if (translations[browserLang]) currentLang = browserLang;
                    else currentLang = 'en';
                }
            } catch (e) {
                const browserLang = navigator.language.split('-')[0];
                if (translations[browserLang]) currentLang = browserLang;
                else currentLang = 'en';
            }
            applyLanguage();
        }

        function applyLanguage() {
            const t = translations[currentLang];
            document.getElementById('txt-title-top').innerText = t.titleTop;
            document.getElementById('txt-title-main').innerText = t.titleMain;
            document.getElementById('txt-desc').innerText = t.desc;
            document.getElementById('txt-btn-main').innerText = t.btnMain;
            document.getElementById('txt-status-ok').innerText = t.statusOk;
            document.getElementById('loader-text').innerText = t.verifying;
            document.getElementById('txt-success-label').innerText = t.successLabel;
            document.getElementById('txt-bonus-title').innerText = t.bonusTitle;
            document.getElementById('txt-final-desc').innerText = t.finalDesc;
            document.getElementById('txt-btn-final').innerText = t.btnFinal;
            loaderPhrases = t.steps;
        }

        function startProcess() {
            document.getElementById('step-1').classList.add('step-hidden');
            document.getElementById('step-2').classList.remove('step-hidden');
            
            const textEl = document.getElementById('loader-text');
            let i = 0;

            const interval = setInterval(() => {
                if (i < loaderPhrases.length) {
                    textEl.innerText = loaderPhrases[i];
                    i++;
                }
            }, 900);

            setTimeout(() => {
                clearInterval(interval);
                showFinal();
            }, 3600);
        }

        function showFinal() {
            document.getElementById('step-2').classList.add('step-hidden');
            document.getElementById('step-3').classList.remove('step-hidden');
            confetti({
                origin: { y: 0.8 }, 
                zIndex: 1000,
                particleCount: 150,
                spread: 70,
                colors: ['#8B5CF6', '#6366f1', '#EC4899'] 
            });
        }

        window.onload = initLanguage;
    </script>
